name: CI

on:
  pull_request:
  workflow_dispatch:

# a new push to the same PR supersedes the old run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Check generated sprites are in sync
        run: |
          pnpm sprites
          git diff --exit-code public/sprites scripts/preview.png
      - run: pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e

  preview:
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency: preview-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build with the preview base path
        run: pnpm build
        env:
          VITE_BASE: /pixelheim/pr-preview/pr-${{ github.event.number }}/
      - name: Deploy playable preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          action: deploy
