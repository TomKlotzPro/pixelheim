name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Check generated sprites are in sync
        run: |
          pnpm sprites
          git diff --exit-code public/sprites scripts/preview.png
      - run: pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
