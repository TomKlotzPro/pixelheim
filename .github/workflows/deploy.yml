name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      # heavier than the PR checks: the balance gate runs before deploys only
      - name: Balance regression (all roles must finish the game)
        run: pnpm sim --check
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
      # Publishes to the gh-pages branch root; PR previews live under
      # pr-preview/ and must survive production deploys.
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean-exclude: pr-preview/
          force: false
